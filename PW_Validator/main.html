<!DOCTYPE html>
<html>

    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draggable & Resizable Block</title>
    <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <form id="form">
        
            <input
                id="name"
                placeholder="Enter your name"
            >
        
            <input
                id="passw"
                type="password"
                placeholder="Enter password"
            >
        
            <input
                id="confirm-passw"
                type="password"
                placeholder="Confirm password"
            >
        
            <button type="submit" id="but">
                Submit
            </button>
        
        </form>
        
        <p id="msg"></p>
        <p id="LiveValue"></p>
        <p id="LivePass"></p>
        <p id="ConfirmMsg"></p>
    </body>

    <script src="index.js"></script>

</html>
