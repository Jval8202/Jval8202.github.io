<!DOCTYPE html>
<html>

    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draggable & Resizable Block</title>
    <link rel="stylesheet" href="style.css">
    </head>

    
    <body>
        <form id="form">

            <input
                id="name"
                placeholder="Enter your name"
            >

            <!-- Message under the name input -->
            <p id="LiveValue" class="feedback"></p>

            <input
                id="passw"
                type="password"
                placeholder="Enter password"
            >

            <p id="LivePass" class="feedback"></p>

            <input
                id="confirm-passw"
                type="password"
                placeholder="Confirm password"
            >

            <p id="ConfirmMsg" class="feedback"></p>

            <button type="submit" id="but">
                Submit
            </button>

        </form>

        <p id="msg"></p>

    </body>

    <script src="index.js"></script>

</html>
